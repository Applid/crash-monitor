<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL - MARKET VITALS</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #050505;
            --border-color: #1a1a1a;
            --text-main: #e0e0e0;
            --text-muted: #666666;
            --accent-danger: #ff2a2a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'JetBrains Mono', 'Noto Sans JP', monospace; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* ヘッダー */
        header {
            padding: 1.2rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            background: var(--bg-color);
            z-index: 10;
        }
        .title { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; }
        .subtitle { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.5rem; letter-spacing: 0.1em; }
        
        /* ティッカーテープ */
        .ticker-wrapper { border-bottom: 1px solid var(--border-color); height: 46px; }

        /* メイングリッド */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 3fr 1fr;
            grid-template-rows: 2fr 1fr;
            gap: 1px;
            background-color: var(--border-color);
            flex-grow: 1;
            overflow: hidden;
        }
        .panel { background-color: var(--panel-bg); position: relative; overflow: hidden; }
        
        /* 各パネルの配置 */
        .main-chart { grid-column: 1 / 2; grid-row: 1 / 2; }
        .market-overview { grid-column: 2 / 3; grid-row: 1 / 3; }
        .technical-analysis { grid-column: 1 / 2; grid-row: 2 / 3; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background-color: var(--border-color); }
        .ta-widget { background-color: var(--panel-bg); }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="title">Market Vitals Terminal</div>
            <div class="subtitle">Continuous Systemic Risk Surveillance</div>
        </div>
        <div style="text-align: right;">
            <div class="subtitle">SYSTEM STATUS</div>
            <div style="color: var(--accent-danger); font-size: 0.9rem; margin-top: 0.3rem;">ACTIVE MONITORING</div>
        </div>
    </header>

    <div class="ticker-wrapper">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                { "proName": "FOREXCOM:SPXUSD", "title": "S&P 500" },
                { "proName": "CBOE:VIX", "title": "VIX" },
                { "description": "WTI Crude", "proName": "NYMEX:CL1!" },
                { "description": "Gold", "proName": "COMEX:GC1!" },
                { "description": "US 10Y", "proName": "TVC:US10Y" }
            ],
            "showSymbolLogo": false,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "adaptive",
            "locale": "ja"
            }
            </script>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel main-chart">
            <div class="tradingview-widget-container">
                <div id="tradingview_chart" style="height:100%; width:100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                "autosize": true,
                "symbol": "CME_MINI:ES1!",
                "interval": "D",
                "timezone": "Asia/Tokyo",
                "theme": "dark",
                "style": "1",
                "locale": "ja",
                "enable_publishing": false,
                "backgroundColor": "#050505",
                "gridColor": "#1a1a1a",
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tradingview_chart"
                });
                </script>
            </div>
        </div>

        <div class="panel market-overview">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px); width:100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                {
                "width": "100%",
                "height": "100%",
                "symbolsGroups": [
                    {
                    "name": "リスク・コモディティ指標",
                    "originalName": "Indices",
                    "symbols": [
                        { "name": "CBOE:VIX", "displayName": "VIX (恐怖指数)" },
                        { "name": "NYMEX:CL1!", "displayName": "WTI 原油" },
                        { "name": "COMEX:GC1!", "displayName": "金 (Gold)" },
                        { "name": "TVC:US10Y", "displayName": "米国10年債利回り" },
                        { "name": "TVC:DXY", "displayName": "ドルインデックス" }
                    ]
                    }
                ],
                "showSymbolLogo": false,
                "colorTheme": "dark",
                "isTransparent": true,
                "locale": "ja",
                "backgroundColor": "#050505"
                }
                </script>
            </div>
        </div>

        <div class="panel technical-analysis">
            <div class="ta-widget">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget" style="height:100%; width:100%;"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "FOREXCOM:SPXUSD",
                    "showIntervalTabs": true,
                    "displayMode": "single",
                    "locale": "ja",
                    "colorTheme": "dark"
                    }
                    </script>
                </div>
            </div>
            <div class="ta-widget">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget" style="height:100%; width:100%;"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "CBOE:VIX",
                    "showIntervalTabs": true,
                    "displayMode": "single",
                    "locale": "ja",
                    "colorTheme": "dark"
                    }
                    </script>
                </div>
            </div>
            <div class="ta-widget">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget" style="height:100%; width:100%;"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "NYMEX:CL1!",
                    "showIntervalTabs": true,
                    "displayMode": "single",
                    "locale": "ja",
                    "colorTheme": "dark"
                    }
                    </script>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
